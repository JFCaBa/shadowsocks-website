{{ $question := .Get "question" }}
<div x-data="{ open: false }" class="border-b border-slate-700">
  <button
    @click="open = !open"
    class="w-full flex justify-between items-center py-4 text-left text-slate-200 hover:text-white transition-colors"
  >
    <span class="font-medium pr-4">{{ $question }}</span>
    <svg
      :class="open ? 'rotate-180' : ''"
      class="w-5 h-5 text-slate-500 transition-transform flex-shrink-0"
      fill="none" stroke="currentColor" viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
  <div x-show="open" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="pb-4 text-sm text-slate-400 leading-relaxed">
    {{ .Inner | markdownify }}
  </div>
</div>

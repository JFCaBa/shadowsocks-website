{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 sm:px-6 py-12">
  <h1 class="text-3xl md:text-4xl font-extrabold mb-8">{{ .Title }}</h1>
  {{ with .Content }}
  <div class="prose prose-invert prose-slate max-w-none mb-8">{{ . }}</div>
  {{ end }}
  <div class="grid gap-4">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="card no-underline group flex items-center gap-4">
      <div>
        <h2 class="text-lg font-bold text-slate-200 group-hover:text-blue-400 transition-colors">{{ .Title }}</h2>
        {{ with .Description }}
        <p class="mt-1 text-sm text-slate-500">{{ . }}</p>
        {{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}

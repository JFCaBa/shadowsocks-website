{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 sm:px-6 py-12">
  <header class="mb-8">
    <h1 class="text-3xl md:text-4xl font-extrabold">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-4 text-lg text-slate-400">{{ . }}</p>
    {{ end }}
  </header>
  <div class="prose prose-invert prose-slate max-w-none
    prose-headings:text-slate-100
    prose-p:text-slate-300
    prose-a:text-blue-400 prose-a:no-underline hover:prose-a:text-blue-300
    prose-strong:text-slate-200
    prose-code:text-emerald-400
    prose-pre:bg-navy-800
    prose-li:text-slate-300
    prose-th:text-slate-300
    prose-td:text-slate-400
  ">
    {{ .Content }}
  </div>
  {{ partial "adsense.html" . }}
</article>
{{ end }}

server {
    listen 80;
    server_name skiprestriction.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name skiprestriction.uk;

    # SSL certs managed by Certbot
    ssl_certificate /etc/letsencrypt/live/skiprestriction.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skiprestriction.uk/privkey.pem;

    # Static site
    root /opt/shadowsocks-website/public;
    index index.html;

    # Root redirect to English
    location = / {
        return 302 /en/;
    }

    # Shadowsocks WebSocket proxy (existing)
    location /shadowsocks {
        proxy_pass http://127.0.0.1:8389;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
